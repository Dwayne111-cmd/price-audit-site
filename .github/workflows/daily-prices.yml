name: Daily Component Prices

on:
  schedule:
    - cron: "10 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch public prices
        env:
          MATERIALS_URL: ${{ secrets.MATERIALS_URL }}
          MATERIALS_TOKEN: ${{ secrets.MATERIALS_TOKEN }}
          SOURCE_REGISTRY_URL: ${{ secrets.SOURCE_REGISTRY_URL }}
          SOURCE_REGISTRY_TOKEN: ${{ secrets.SOURCE_REGISTRY_TOKEN }}
          PRICE_SCRAPER_SOURCE_SCOPE: global
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_ACCESS_TOKEN: ${{ secrets.DIGIKEY_ACCESS_TOKEN }}
          NEXAR_TOKEN: ${{ secrets.NEXAR_TOKEN }}
        run: node scripts/fetch-prices.mjs

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/data/price-history.json
          git diff --cached --quiet || git commit -m "chore: update component price history"
          git push
